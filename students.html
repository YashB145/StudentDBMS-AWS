<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <style>
        body { font-family: Arial; padding: 30px; background: #f0f2f5; }
        h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #3498db; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        .btn { padding: 8px 16px; background: #3498db; color: white;
               text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>👨‍🎓 All Students</h2>
    <a href="/" class="btn">🏠 Home</a>
    <a href="/add_student" class="btn">➕ Add Student</a>
    <br><br>
    <table>
        <tr>
            <th>Roll No</th><th>First Name</th><th>Last Name</th>
            <th>Email</th><th>Department</th><th>Year</th>
        </tr>
        {% for s in students %}
        <tr>
            <td>{{ s[1] }}</td><td>{{ s[2] }}</td><td>{{ s[3] }}</td>
            <td>{{ s[4] }}</td><td>{{ s[8] }}</td><td>{{ s[9] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>

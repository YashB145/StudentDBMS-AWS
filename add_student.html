<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <style>
        body { font-family: Arial; padding: 30px; background: #f0f2f5; }
        h2 { color: #2c3e50; }
        form { background: white; padding: 30px; border-radius: 10px; max-width: 500px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3498db; color: white; padding: 12px 30px;
                 border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn { padding: 8px 16px; background: #3498db; color: white;
               text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>➕ Add New Student</h2>
    <a href="/" class="btn">🏠 Home</a>
    <br><br>
    <form method="POST">
        <input type="text" name="roll_number" placeholder="Roll Number" required>
        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="last_name" placeholder="Last Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="date" name="date_of_birth" required>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" name="department" placeholder="Department" required>
        <input type="number" name="admission_year" placeholder="Admission Year" required>
        <button type="submit">Add Student</button>
    </form>
</body>
</html>
